name: Build WDA IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Clone WebDriverAgent
        run: git clone --depth=1 https://github.com/appium/WebDriverAgent.git /tmp/wda-src
      - name: Set Xcode project settings
        run: |
          cd /tmp/wda-src
          # Set development team and automatic signing in xcodeproj
          ruby -e '
            require "xcodeproj"
            project = Xcodeproj::Project.open("WebDriverAgent.xcodeproj")
            project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings["CODE_SIGN_STYLE"] = "Automatic"
                config.build_settings["DEVELOPMENT_TEAM"] = "62QYD66L95"
                config.build_settings["PRODUCT_BUNDLE_IDENTIFIER"] = "com.facebook.WebDriverAgentRunner.xctrunner"
              end
            end
            project.save
          '
      - name: Build and sign for device
        run: |
          cd /tmp/wda-src
          xcodebuild build-for-testing \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            DEVELOPMENT_TEAM=62QYD66L95 \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="iPhone Developer" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -allowProvisioningUpdates
      - name: Package IPA
        run: |
          cd /tmp/wda-src/build/Build/Products/Release-iphoneos
          ls -la *.app/
          mkdir Payload && cp -r *.app Payload/ && zip -r WDA.ipa Payload
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WDA-IPA
          path: /tmp/wda-src/build/Build/Products/Release-iphoneos/WDA.ipa