name: Build WDA IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: master
      - run: ./Scripts/bootstrap.sh
      - run: |
          xcodebuild build-for-testing -scheme WebDriverAgentRunner -sdk iphoneos -configuration Release -derivedDataPath build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - run: |
          cd build/Build/Products/Release-iphoneos
          mkdir Payload && cp -r *.app Payload/
          zip -r WDA.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: WDA-IPA
          path: build/Build/Products/Release-iphoneos/WDA.ipa