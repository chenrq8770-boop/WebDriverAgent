name: Build WDA IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Clone WebDriverAgent
        run: git clone --depth=1 https://github.com/appium/WebDriverAgent.git wda-src
      - name: Bootstrap
        working-directory: wda-src
        run: ./Scripts/bootstrap.sh
      - name: Build for device
        working-directory: wda-src
        run: |
          xcodebuild build-for-testing \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Package IPA
        run: |
          cd wda-src/build/Build/Products/Release-iphoneos
          mkdir Payload
          cp -r *.app Payload/
          zip -r WDA.ipa Payload
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WDA-IPA
          path: wda-src/build/Build/Products/Release-iphoneos/WDA.ipa